<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>176 Metrics</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f1a;font-family:'Rajdhani',sans-serif;color:#c0c8d0}
#wrap{display:flex;width:100%;height:100%}
#left{width:38%;display:flex;align-items:center;justify-content:center;padding:5% 4% 5% 6%;position:relative}
#left h1{font-size:clamp(28px,3.2vw,56px);font-weight:600;line-height:1.35;color:#c0c8d0}
#left h1 em{font-style:normal;color:#d4845a;text-shadow:0 0 15px rgba(212,132,90,0.4)}
#right{width:62%;position:relative}
canvas{width:100%;height:100%;display:block}
#counters{position:absolute;top:28px;right:36px;text-align:right;font-family:'Share Tech Mono',monospace;opacity:0;transition:opacity 0.6s}
#counters .c{font-size:clamp(14px,1.4vw,22px);color:#6a8090;margin-bottom:4px}
#counters .c span{color:#d4845a;text-shadow:0 0 12px rgba(212,132,90,0.35);font-size:clamp(20px,2vw,34px)}
</style>
</head>
<body>
<div id="wrap">
  <div id="left">
    <h1>It defined <em>176 metrics</em> and collected <em>3,279 data points</em></h1>
  </div>
  <div id="right">
    <canvas id="cv"></canvas>
    <div id="counters">
      <div class="c"><span id="cMetrics">0</span> metrics</div>
      <div class="c"><span id="cPoints">0</span> data points</div>
    </div>
  </div>
</div>
<script>
(()=>{
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const right=document.getElementById('right');
let W,H,dpr;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=right.clientWidth;H=right.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize',resize);

// Categories with colors and counts
const cats=[
  {n:57,c:'#8a7ac9'},{n:41,c:'#d4a030'},{n:16,c:'#5aafcf'},
  {n:10,c:'#4acaaa'},{n:10,c:'#5abade'},{n:10,c:'#da7060'},
  {n:8,c:'#4acaaa'},{n:8,c:'#7aa2d4'},{n:5,c:'#5ac9a0'},{n:11,c:'#e8955f'}
];
// Build color pool
const pool=[];
cats.forEach(c=>{for(let i=0;i<c.n;i++)pool.push(c.c)});
// Shuffle
for(let i=pool.length-1;i>0;i--){const j=Math.random()*i|0;[pool[i],pool[j]]=[pool[j],pool[i]]}

// Grid
const COLS=14,ROWS=13,TOTAL=COLS*ROWS; // 182, we'll use 176
const padX=16,padY=16,gapX=4,gapY=4;
const cellW=(W-padX*2-(COLS-1)*gapX)/COLS;
const cellH=(H-padY*2-(ROWS-1)*gapY)/ROWS;

// Generate sparklines
const sparks=[];
for(let i=0;i<176;i++){
  const col=i%COLS,row=(i/COLS)|0;
  const pts=5+Math.random()*10|0;
  const data=[];
  let v=0.3+Math.random()*0.4;
  for(let p=0;p<pts;p++){
    v+=((Math.random()-0.5)*0.3);
    v=Math.max(0.05,Math.min(0.95,v));
    data.push(v);
  }
  sparks.push({
    x:padX+col*(cellW+gapX),
    y:padY+row*(cellH+gapY),
    w:cellW,h:cellH,
    data,
    color:pool[i]||'#6a8090',
    progress:0, // 0-1 draw progress
    delay:i*20, // ms stagger
    started:false,
    done:false
  });
}

const DRAW_DURATION=400; // ms per sparkline draw
let t0=null,allDone=false,countersDone=false;

function drawSparkline(s,prog){
  const pts=s.data;
  const n=pts.length;
  const drawN=Math.max(2,Math.ceil(prog*n));
  const stepX=s.w/(n-1);
  
  // Glow
  ctx.save();
  ctx.globalAlpha=0.3*prog;
  ctx.shadowColor=s.color;
  ctx.shadowBlur=6;
  ctx.beginPath();
  for(let i=0;i<drawN;i++){
    const px=s.x+i*stepX;
    const py=s.y+s.h-pts[i]*s.h;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.strokeStyle=s.color;
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.restore();

  // Main line
  ctx.save();
  ctx.globalAlpha=0.5+0.5*prog;
  ctx.beginPath();
  for(let i=0;i<drawN;i++){
    const px=s.x+i*stepX;
    const py=s.y+s.h-pts[i]*s.h;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.strokeStyle=s.color;
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.restore();
}

// Pulse state
let pulsePhase=0;
const pulseTargets=[];
for(let i=0;i<30;i++)pulseTargets.push(Math.random()*176|0);

function animateCounter(el,target,duration,start,now){
  const p=Math.min(1,(now-start)/duration);
  const ease=1-Math.pow(1-p,3);
  const v=Math.round(ease*target);
  el.textContent=v.toLocaleString();
  return p>=1;
}

let counterStart=0;

function frame(ts){
  if(!t0)t0=ts;
  const elapsed=ts-t0;
  
  ctx.clearRect(0,0,W,H);
  
  let allDrawn=true;
  for(const s of sparks){
    if(elapsed<s.delay){allDrawn=false;continue}
    const localT=elapsed-s.delay;
    s.progress=Math.min(1,localT/DRAW_DURATION);
    if(s.progress<1)allDrawn=false;
    drawSparkline(s,s.progress);
  }

  // Pulse after all done
  if(allDrawn&&!allDone){
    allDone=true;
    counterStart=ts;
    document.getElementById('counters').style.opacity='1';
  }

  if(allDone){
    pulsePhase+=0.02;
    for(const idx of pulseTargets){
      const s=sparks[idx];
      const glow=0.15+0.15*Math.sin(pulsePhase+idx*0.7);
      ctx.save();
      ctx.globalAlpha=glow;
      ctx.shadowColor=s.color;
      ctx.shadowBlur=10;
      ctx.beginPath();
      const stepX=s.w/(s.data.length-1);
      for(let i=0;i<s.data.length;i++){
        const px=s.x+i*stepX;
        const py=s.y+s.h-s.data[i]*s.h;
        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
      }
      ctx.strokeStyle=s.color;
      ctx.lineWidth=2;
      ctx.stroke();
      ctx.restore();
    }

    if(!countersDone){
      const d1=animateCounter(document.getElementById('cMetrics'),176,1200,counterStart,ts);
      const d2=animateCounter(document.getElementById('cPoints'),3279,1800,counterStart,ts);
      if(d1&&d2)countersDone=true;
    }
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
