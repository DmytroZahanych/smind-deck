<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMind — Network Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f1a;font-family:'Rajdhani',sans-serif;color:#c0c8d0}
#left{position:absolute;left:0;top:0;width:38%;height:100%;display:flex;align-items:center;padding:5% 4% 5% 5%;z-index:2}
#left h1{font-size:clamp(28px,3.2vw,54px);font-weight:600;line-height:1.25;color:#c0c8d0}
#left h1 em{font-style:normal;color:#d4845a;text-shadow:0 0 15px rgba(212,132,90,0.4)}
canvas{position:absolute;right:0;top:0;width:62%;height:100%}
#hud{position:absolute;right:4%;bottom:8%;text-align:right;z-index:2;pointer-events:none}
#year{font-family:'Share Tech Mono',monospace;font-size:clamp(48px,6vw,96px);color:#d4845a;text-shadow:0 0 15px rgba(212,132,90,0.4);line-height:1}
#count{font-family:'Share Tech Mono',monospace;font-size:clamp(16px,1.6vw,28px);color:#6a8090;margin-top:4px}
</style>
</head>
<body>
<div id="left"><h1>It built a <em>living model</em> of who I am — <em>123 nodes</em>, tracked since birth</h1></div>
<canvas id="c"></canvas>
<div id="hud"><div id="year">1993</div><div id="count">0 nodes</div></div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const yearEl=document.getElementById('year'),countEl=document.getElementById('count');
let W,H,dpr;
function resize(){dpr=devicePixelRatio||1;const r=C.getBoundingClientRect();W=r.width;H=r.height;C.width=W*dpr;C.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
resize();window.onresize=resize;

const CAT_COLORS={health:'#4acaaa',family:'#d47ab0',career:'#5aafcf',habit:'#c95a8a',finance:'#d4a030',immigration:'#7aa2d4',lifestyle:'#8a7ac9',smind:'#d4845a',schedule:'#e8955f'};

function nc(name){
  if(/health|allerg|diet|condition|blood|weight|procedure/.test(name))return'health';
  if(/family|mother|father|kostya|alex|marriage|relationship|social/.test(name))return'family';
  if(/career|work|engineer|people_management/.test(name))return'career';
  if(/habit|alcohol|gaming|overeating/.test(name))return'habit';
  if(/bank|finance|bill/.test(name))return'finance';
  if(/immig|visa|portugal|displaced/.test(name))return'immigration';
  if(/personality|introvert|values|altruism|lifestyle|negative|safety|turbulence/.test(name))return'lifestyle';
  if(/smind|withings|society|ecosystem|device/.test(name))return'smind';
  if(/sched|constraint|appoint|recur|remind/.test(name))return'schedule';
  return'lifestyle';
}

// Define all 123 nodes with year and name
const rawNodes=[];
function add(y,names){names.forEach(n=>rawNodes.push({year:y,name:n,cat:nc(n)}))}

add(1970,['birthday_father','birthday_mother','birthday_kostya','birthday_alex']);
add(1993,['health_allergies','health_conditions','health_diet','habit_no_alcohol','work_style','social_relationship_mother','social_relationship_father','social_relationship_kostya','values_altruism','personality_introvert','habit_gaming','habit_overeating','negative_no_children','safety_emergency_contact','social_circle','people_management','health_eyesight','health_posture','lifestyle_sleep','lifestyle_cooking','family_pets','habit_caffeine','personality_curiosity']);
add(2013,['career_start_engineer']);
add(2016,['career_milestone_lead']);
add(2018,['marriage']);
add(2019,['career_milestone_senior']);
add(2020,['health_experiment_fasting','lifestyle_remote_work','habit_walking']);
add(2021,['health_experiment_supplements','lifestyle_minimalism']);
add(2022,['war_displacement_ukraine','moved_to_portugal','trauma_war','immigration_start','health_stress','career_remote_global','social_new_circle']);
add(2023,['immigration_process','immigration_visa','habit_journaling','habit_meditation','turbulence_anxiety','health_therapy','lifestyle_portuguese','career_contract']);
add(2024,['career_change_ic','career_change_company','health_discovery_gut','health_discovery_sleep','lifestyle_fitness','habit_reading']);
add(2025,['smind_creation','smind_withings_scale','smind_withings_bp','smind_bank_data','health_procedure_checkup','health_procedure_dental','career_smind_focus','lifestyle_quantified','smind_face','smind_goals','smind_scheduling','smind_user_data','smind_data_pipeline','habit_tracking','finance_budget_setup','smind_tracker_push','smind_society_init']);
add(2026,['smind_ecosystem','smind_society_architecture','smind_hos','smind_life_dimensions','smind_extended_society','smind_dashboard','health_blood_work_2026','lifestyle_optimization','career_presentation','smind_society_scheduling','smind_core_jobs','smind_telegram_integration','social_community','habit_consistency','finance_bill_tracking','smind_raw_data','smind_workspace','health_allergy_update']);

// scheduling constraints in 2025-2026
const schedNames=[];
for(let i=0;i<14;i++) schedNames.push('sched_constraint_'+i);
add(2025,schedNames.slice(0,8));
add(2026,schedNames.slice(8).concat(['sched_appoint_a','sched_appoint_b','sched_recur_a','sched_recur_b','sched_recur_c','sched_remind_a','sched_remind_b']));

// Pad to exactly 123 if needed (should be close)
while(rawNodes.length<123) rawNodes.push({year:2026,name:'sched_extra_'+rawNodes.length,cat:'schedule'});
rawNodes.length=123;

// Sort by year
rawNodes.sort((a,b)=>a.year-b.year);

// Build node objects
const nodes=rawNodes.map((r,i)=>{
  const angle=Math.random()*Math.PI*2;
  const dist=30+Math.random()*180*(0.3+0.7*((r.year-1970)/56));
  return{
    x:W/2+Math.cos(angle)*dist,
    y:H/2+Math.sin(angle)*dist,
    vx:(Math.random()-0.5)*0.3,
    vy:(Math.random()-0.5)*0.3,
    r:4+Math.random()*4,
    cat:r.cat,
    year:r.year,
    name:r.name,
    alive:false,
    alpha:0,
    bornT:0
  };
});

// Build edges: connect nodes of same/related categories that are close in index
const edges=[];
for(let i=0;i<nodes.length;i++){
  for(let j=i+1;j<nodes.length;j++){
    if(j-i>30)continue;
    const a=nodes[i],b=nodes[j];
    const sameCat=a.cat===b.cat;
    const related=sameCat||Math.abs(a.year-b.year)<=2;
    if(related&&Math.random()<(sameCat?0.45:0.08)){
      edges.push([i,j]);
    }
  }
}

// Animation timeline
const yearOrder=[1970,1993,2013,2016,2018,2019,2020,2021,2022,2023,2024,2025,2026];
const yearDurations={1970:800,1993:2500,2013:400,2016:350,2018:350,2019:350,2020:600,2021:500,2022:1200,2023:1000,2024:800,2025:2000,2026:2200};

let animStart=0,phase='animate',currentYearIdx=0,yearStartT=0,aliveCount=0;
let nodesForYear={};
yearOrder.forEach(y=>{nodesForYear[y]=nodes.filter(n=>n.year===y)});

function spawnNode(n,t){
  n.alive=true;n.bornT=t;n.alpha=0;
  // position: burst from center with some spread
  const cx=W/2,cy=H/2;
  const angle=Math.random()*Math.PI*2;
  const yearFrac=(n.year-1970)/56;
  const dist=40+Math.random()*(100+yearFrac*140);
  n.x=cx+Math.cos(angle)*dist;
  n.y=cy+Math.sin(angle)*dist;
  n.vx=Math.cos(angle)*(1+Math.random()*2);
  n.vy=Math.sin(angle)*(1+Math.random()*2);
  aliveCount++;
}

let pendingQueue=[], pendingIdx=0, pendingInterval=0;

function startYear(idx,t){
  currentYearIdx=idx;yearStartT=t;
  const y=yearOrder[idx];
  const batch=nodesForYear[y];
  pendingQueue=batch.slice();pendingIdx=0;
  pendingInterval=batch.length>0?(yearDurations[y]*0.7)/batch.length:100;
}

let lastSpawnT=0;

function update(t){
  if(!animStart){animStart=t;startYear(0,t);lastSpawnT=t}
  const elapsed=t-animStart;

  // Spawn pending nodes
  if(phase==='animate'&&pendingQueue.length>0){
    while(pendingIdx<pendingQueue.length&&t-lastSpawnT>=pendingInterval){
      spawnNode(pendingQueue[pendingIdx],t);pendingIdx++;lastSpawnT=t;
    }
    // Check if year done
    const y=yearOrder[currentYearIdx];
    if(pendingIdx>=pendingQueue.length&&t-yearStartT>yearDurations[y]){
      if(currentYearIdx<yearOrder.length-1){
        startYear(currentYearIdx+1,t);
      } else {
        phase='idle';
      }
    }
  }

  // Physics: gentle repulsion + drift
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];if(!n.alive)continue;
    n.alpha=Math.min(1,(t-n.bornT)/600);
    // attract to center gently
    const dx=W/2-n.x,dy=H/2-n.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    n.vx+=dx/d*0.01;n.vy+=dy/d*0.01;
    // repel from close neighbors
    for(let j=i+1;j<nodes.length;j++){
      const m=nodes[j];if(!m.alive)continue;
      const ex=n.x-m.x,ey=n.y-m.y;
      const ed=Math.sqrt(ex*ex+ey*ey)||1;
      if(ed<40){const f=0.3/ed;n.vx+=ex*f;n.vy+=ey*f;m.vx-=ex*f;m.vy-=ey*f;}
    }
    // breathing in idle
    if(phase==='idle'){
      n.vx+=Math.sin(t/2000+i)*0.003;
      n.vy+=Math.cos(t/2300+i*1.3)*0.003;
    }
    n.vx*=0.97;n.vy*=0.97;
    n.x+=n.vx;n.y+=n.vy;
    // bounds
    n.x=Math.max(10,Math.min(W-10,n.x));
    n.y=Math.max(10,Math.min(H-10,n.y));
  }
}

function draw(t){
  ctx.clearRect(0,0,W,H);

  // Edges
  for(const[i,j]of edges){
    const a=nodes[i],b=nodes[j];
    if(!a.alive||!b.alive)continue;
    const alpha=Math.min(a.alpha,b.alpha)*0.15;
    ctx.strokeStyle=CAT_COLORS[a.cat]||'#6a8090';
    ctx.globalAlpha=alpha;
    ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }

  // Nodes
  ctx.globalAlpha=1;
  for(const n of nodes){
    if(!n.alive)continue;
    const col=CAT_COLORS[n.cat]||'#c0c8d0';
    ctx.globalAlpha=n.alpha;
    // glow
    ctx.shadowColor=col;ctx.shadowBlur=8*n.alpha;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // HUD
  if(phase==='animate'){
    yearEl.textContent=yearOrder[currentYearIdx];
  }
  countEl.textContent=aliveCount+' nodes';
}

function loop(t){
  update(t);draw(t);requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
